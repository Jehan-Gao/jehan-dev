name: Sync Strava Activities

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Sync Strava activities
        run: pnpm sync:strava:activities
        env:
          STRAVA_CLIENT_ID: ${{ vars.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ vars.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/strava/activities/
          git commit -m 'Sync Strava activities' || echo "No changes to commit"
          git push
